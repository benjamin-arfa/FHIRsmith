name: Deploy — production

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: [self-hosted, fhirtx]
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install runtime deps
        run: npm ci --omit=dev

      - name: Deploy
        run: bash deploy/deploy.sh prod
