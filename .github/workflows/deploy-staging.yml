name: Deploy — staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging
    runs-on: [self-hosted, fhirtx]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dev deps for tests
        run: npm ci

      - name: Run tests (smoke only)
        run: npm run test:unit
        timeout-minutes: 10
        env:
          SUPPRESS_LOGS: 'true'
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Deploy
        run: bash deploy/deploy.sh staging
