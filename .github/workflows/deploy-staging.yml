name: Deploy — staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging
    runs-on: [self-hosted, fhirtx]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install runtime deps
        run: npm ci --omit=dev

      - name: Deploy
        run: bash deploy/deploy.sh staging
